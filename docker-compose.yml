version: '3.8'

# =============================================================================
# Tobi Restaurant AI — Docker Compose
#
# Two services:
#   app          — FastAPI application (port 8000, public-facing)
#   llama-server — Llama-3-8B inference server (port 8080, internal only)
#
# Quick start:
#   docker compose up --build          # Full AI mode (requires 4.9 GB model file)
#   USE_LOCAL_AI=false docker compose up --build   # Template-only mode (no GPU/model needed)
#
# The `app` service waits for `llama-server` to pass its health check before
# starting, so the first boot takes ~15 minutes while the model loads into RAM.
# Subsequent starts are faster because the model file is already on disk.
#
# Volumes overview:
#   ./data      → /app/data      Persists the SQLite conversation database
#   ./logs      → /app/logs      Persists application logs
#   ./models    → /app/models    Read-only model files (GGUF format)
#   ./app       → /app/app       Live-reloads Python source in dev (comment out for prod)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # app — Restaurant AI FastAPI service
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: restaurant-ai
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models:ro
      - ./app:/app/app
    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s   # Give the app 10 s to start before health checks begin

    networks:
      - restaurant-network


  # ---------------------------------------------------------------------------
  # llama-server — Llama-3-8B inference server
  #
  # Runs llama-cpp-python's built-in HTTP server, which exposes an OpenAI-
  # compatible API at /v1/chat/completions.  The `app` container calls this
  # endpoint internally via the restaurant-network bridge.
  #
  # Model: Meta-Llama-3-8B-Instruct.Q4_K_M.gguf  (4.9 GB)
  #   - Must be placed in ./models/ before running
  #   - Download script: scripts/ec2-setup-with-ai.sh
  #
  # Resource requirements:
  #   - ~7 GB RAM to load the model (Q4_K_M quantisation)
  #   - 4 CPU cores for reasonable throughput
  #   - No GPU required (pure CPU inference via llama.cpp)
  # ---------------------------------------------------------------------------
  llama-server:
    build:
      context: .
      dockerfile: Dockerfile.llama-server
    container_name: restaurant-ai-llama
    ports:
      - "8080:8080"   # Exposed for direct testing; not needed by frontend
    volumes:
      - ./models:/models:ro   # Read-only — model file never modified at runtime
    command: >
      python -m llama_cpp.server
      --model /models/Meta-Llama-3-8B-Instruct.Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --n_ctx 4096
      --chat_format llama-3
      --use_mmap false
    networks:
      - restaurant-network

    deploy:
      resources:
        limits:
          memory: 9G      # Hard cap — prevents OOM kill from taking down the host
          cpus: '4.0'
        reservations:
          memory: 7G      # Guaranteed allocation for the model
          cpus: '2.0'
      restart_policy:
        condition: on-failure
        delay: 30s
        max_attempts: 5   # After 5 failures the service stays stopped
        window: 300s

    healthcheck:
      # Polls /v1/models — returns 200 once the model is fully loaded into RAM
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/v1/models').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      # 900 s (15 min) start_period: --use_mmap false means the entire 4.9 GB model
      # must be read from disk into RAM before the server accepts requests.
      # This is expected on first boot; don't reduce this value without testing.
      start_period: 900s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"   # Rotate after 10 MB
        max-file: "3"     # Keep 3 rotated files (30 MB total)

    stop_grace_period: 30s  # Give the model server time to finish in-flight requests
    restart: unless-stopped


# =============================================================================
# Networks
# =============================================================================
networks:
  restaurant-network:
    driver: bridge   # Default bridge network; containers find each other by service name
